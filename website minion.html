<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MinionUHC Stats</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.2/sql-wasm.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --font: Arial, Helvetica, sans-serif;
}

/* LIGHT MODE */
html[data-theme="light"] {
  --bg:      #f4f3f1;
  --surface: #eeecea;
  --border:  #d8d5d0;
  --text:    #1a1a1a;
  --muted:   #8a8680;
}

/* DARK MODE (default) */
html[data-theme="dark"] {
  --bg:      #141414;
  --surface: #1e1e1e;
  --border:  #2e2e2e;
  --text:    #e8e8e8;
  --muted:   #888888;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  font-size: 14px;
  line-height: 1.5;
}

#app { max-width: 1100px; margin: 0 auto; padding: 0 1.5rem 4rem; }

/* HEADER */
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 1.5rem 0 1rem;
  border-bottom: 1px solid var(--border);
  margin-bottom: 2rem;
  flex-wrap: wrap;
  gap: 0.75rem;
}
.logo { display: flex; align-items: center; gap: 0.5rem; }
.logo-icon { font-size: 18px; }
.logo-text { font-size: 1.1rem; font-weight: bold; letter-spacing: -0.3px; }
.logo-text span { color: var(--muted); font-weight: normal; }

.header-right { display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap; margin-left: auto; }
.header-left { display: flex; align-items: center; gap: 0.5rem; }
.status-pill {
  display: flex; align-items: center; gap: 0.4rem;
  border: 1px solid var(--border);
  padding: 0.3rem 0.75rem;
  font-size: 12px;
  color: var(--muted);
}
.status-dot { width: 6px; height: 6px; border-radius: 50%; background: #111; flex-shrink: 0; }
.status-dot.loading { animation: pulse 1s ease infinite; }
.status-dot.error { background: #888; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.2} }

/* BUTTONS */
.btn {
  font-family: var(--font);
  font-size: 13px;
  padding: 0.4rem 0.9rem;
  border: 1px solid #1a1a1a;
  border-radius: 4px;
  cursor: pointer;
  background: var(--bg);
  color: #1a1a1a;
  transition: background 0.15s, color 0.15s;
}
.btn:hover { background: #111; color: #fff; }
.btn-primary { background: #111; color: #fff; }
.btn-primary:hover { background: #444; }
.btn:active { opacity: 0.7; }
.btn-ghost { background: var(--bg); color: var(--muted); border-color: var(--border); }
.btn-ghost:hover { background: #111; color: #fff; border-color: #111; }

/* SETUP */
#setup-panel { max-width: 520px; margin: 4rem auto; }
.setup-heading { font-size: 1.5rem; font-weight: bold; margin-bottom: 0.4rem; }
.setup-sub { color: var(--muted); font-size: 13px; margin-bottom: 1.5rem; }
.input-group {
  display: flex; gap: 0; border: 1px solid var(--border); border-radius: 5px; overflow: hidden; margin-bottom: 1rem;
}
#csv-url {
  flex: 1; background: var(--bg); border: none; outline: none;
  color: var(--text); font-family: var(--font); font-size: 13px; padding: 0.5rem 0.75rem;
}
#csv-url::placeholder { color: var(--muted); }
.setup-hint { color: var(--muted); font-size: 12px; line-height: 1.8; }
.setup-hint code {
  background: var(--surface); border: 1px solid var(--border);
  padding: 1px 5px; font-family: monospace; font-size: 11px; color: #111;
}

/* ERROR */
#error-msg {
  display: none;
  border: 1px solid #111;
  padding: 0.75rem 1rem;
  font-size: 13px;
  color: #111;
  margin-bottom: 1.5rem;
  background: var(--surface);
}

/* DASHBOARD */
#dashboard { display: none; }
@keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }

/* CARDS */
.cards {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 1px;
  border: 1px solid var(--border);
  border-radius: 6px;
  margin-bottom: 2rem;
  background: var(--border);
  overflow: hidden;
}
.card {
  background: var(--surface);
  padding: 1.25rem;
}
.card-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); margin-bottom: 0.4rem; }
.card-value { font-size: 1.8rem; font-weight: bold; line-height: 1; margin-bottom: 0.3rem; }
.card-sub { font-size: 11px; color: var(--muted); }

/* SECTION */
.section { border: 1px solid var(--border); border-radius: 6px; margin-bottom: 2rem; overflow: hidden; }
.section-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0.75rem 1rem;
  border-bottom: 1px solid var(--border);
  flex-wrap: wrap; gap: 0.5rem;
}
.section-title { font-size: 11px; font-weight: bold; text-transform: uppercase; letter-spacing: 0.07em; color: var(--muted); }

/* CHARTS */
.charts-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 0; }
.chart-box { position: relative; height: 220px; padding: 1rem; border-right: 1px solid var(--border); }
.chart-box:last-child { border-right: none; }
.chart-label { font-size: 11px; font-weight: bold; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); margin-bottom: 0.5rem; }

/* TABLE */
.table-controls { display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap; }
.search-wrap { position: relative; flex: 1; min-width: 160px; }
.search-icon { position: absolute; left: 0.6rem; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 13px; pointer-events: none; }
#search-input {
  width: 100%; background: var(--bg); border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--text); font-family: var(--font); font-size: 13px;
  padding: 0.4rem 0.6rem 0.4rem 2rem; outline: none;
}
#search-input:focus { border-color: #111; }
#search-input::placeholder { color: var(--muted); }
.result-count { font-size: 12px; color: var(--muted); white-space: nowrap; }

.table-wrap { overflow-x: auto; position: relative; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }

thead th {
  text-align: left; padding: 0.6rem 1rem;
  font-size: 11px; font-weight: bold; text-transform: uppercase;
  letter-spacing: 0.06em; color: var(--muted);
  border-bottom: 1px solid var(--border);
  cursor: pointer; white-space: nowrap; user-select: none;
  background: var(--surface);
}
thead th:nth-child(1) {
  position: sticky; left: 0; z-index: 3;
  box-shadow: 2px 0 4px rgba(0,0,0,0.06);
}
thead th:nth-child(2) {
  position: sticky; left: 44px; z-index: 3; min-width: 140px;
  box-shadow: 2px 0 4px rgba(0,0,0,0.06);
}
thead th:hover { color: var(--text); }
thead th.sort-active { color: var(--text); }
.sort-icon { margin-left: 3px; font-size: 10px; opacity: 0.4; }
thead th.sort-active .sort-icon { opacity: 1; }

tbody tr { border-bottom: 1px solid var(--border); }
tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: var(--surface); }
tbody tr:hover .td-rank,
tbody tr:hover .td-player { background: var(--surface); }
tbody td { padding: 0.65rem 1rem; vertical-align: middle; }

.td-rank {
  width: 44px; font-size: 12px; color: var(--muted); text-align: center;
  position: sticky; left: 0; z-index: 2; background: var(--surface);
  box-shadow: 2px 0 4px rgba(0,0,0,0.06);
}
.medal { font-size: 14px; }
.td-player {
  font-weight: bold;
  position: sticky; left: 44px; z-index: 2; background: var(--surface);
  min-width: 140px; box-shadow: 2px 0 4px rgba(0,0,0,0.06);
}
.td-player-inner { display: flex; align-items: center; gap: 0.5rem; }
.player-link { color: inherit; text-decoration: none; }
.player-link:hover { text-decoration: underline; opacity: 0.8; }
.td-player-inner img { width: 20px; height: 20px; border-radius: 2px; image-rendering: pixelated; flex-shrink: 0; }
.td-num { text-align: right; font-family: monospace; font-size: 13px; }
.td-bar { width: 80px; padding-right: 1rem; }
.bar-track { height: 3px; background: var(--border); }
.bar-fill { height: 100%; background: #111; transition: width 0.4s ease; }

#no-results { display: none; padding: 2.5rem; text-align: center; color: var(--muted); font-size: 13px; }

/* DB UPLOAD */
.or-divider {
  display: flex; align-items: center; gap: 0.75rem;
  color: var(--muted); font-size: 12px; margin: 1rem 0;
}
.or-divider::before, .or-divider::after {
  content: ''; flex: 1; height: 1px; background: var(--border);
}
.db-upload-label {
  display: flex; align-items: center; justify-content: center;
  gap: 0.5rem; width: 100%;
  border: 1px dashed var(--border);
  border-radius: 5px;
  padding: 0.85rem;
  font-size: 13px;
  color: var(--muted);
  cursor: pointer;
  transition: border-color 0.2s, color 0.2s;
}
.db-upload-label:hover { border-color: var(--text); color: var(--text); }
#db-file-input { display: none; }
#table-select-wrap {
  display: none; margin-top: 0.75rem;
}
#table-select {
  width: 100%; background: var(--bg); border: 1px solid var(--border);
  border-radius: 4px; color: var(--text); font-family: var(--font);
  font-size: 13px; padding: 0.45rem 0.75rem; outline: none;
}
#table-select:focus { border-color: var(--text); }


::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); }

/* SOCIAL LINKS */
.social-links { display: flex; align-items: center; gap: 0.5rem; }
.social-btn {
  display: flex; align-items: center; justify-content: center;
  width: 32px; height: 32px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--muted);
  text-decoration: none;
  transition: color 0.15s, border-color 0.15s, background 0.15s;
  flex-shrink: 0;
}
.social-btn:hover { border-color: var(--text); color: var(--text); background: var(--bg); }
.social-btn svg { width: 16px; height: 16px; fill: currentColor; }
</style>
</head>

      <button class="btn btn-primary" onclick="loadData()">Load →</button>
    </div>
    <div class="setup-hint">
      Supports any publicly accessible CSV file.<br/>
      For Google Sheets: <code>File → Share → Publish to web → CSV</code>
    </div>
    <div class="or-divider">or</div>
    <label class="db-upload-label" for="db-file-input">
      ⬆ Upload a SQLite .db file
    </label>
    <input type="file" id="db-file-input" accept=".db,.sqlite,.sqlite3" onchange="loadDbFile(event)" />
    <div id="table-select-wrap">
      <select id="table-select" onchange="loadTableFromDb()">
        <option value="">— Select a table —</option>
      </select>
    </div>
    <br/>
    <button class="btn btn-ghost" style="margin:0 auto" onclick="loadDemo()">Try demo data</button>
  </div>

  <!-- DASHBOARD -->
  <div id="dashboard">
    <div class="cards" id="cards"></div>

    <div class="section">
      <div class="section-header">
        <div style="display:flex;align-items:center;gap:0.75rem;flex-wrap:wrap;">
          <div class="section-title">Leaderboard</div>
          <label class="btn btn-ghost" for="db-upload-quick" style="font-size:11px;padding:0.3rem 0.7rem;cursor:pointer;letter-spacing:0.04em;font-weight:bold;">
            ⬆ Upload .db
          </label>
          <input type="file" id="db-upload-quick" accept=".db,.sqlite,.sqlite3" style="display:none" onchange="loadDbFile(event)" />
        </div>
        <div class="table-controls">
          <div class="search-wrap">
            <span class="search-icon">⌕</span>
            <input id="search-input" type="text" placeholder="Search players…" oninput="filterTable()"/>
          </div>
          <span class="result-count" id="result-count"></span>
        </div>
      </div>
      <div class="table-wrap">
        <table>
          <thead id="thead"></thead>
          <tbody id="tbody"></tbody>
        </table>
        <div id="no-results">No players match your search.</div>
      </div>
    </div>
  </div>

</div>
<script>
// ── STATE ────────────────────────────────────────────────────────────────────
let allRows = [], headers = [], sortCol = 'Kills', sortAsc = false;
let refreshInterval = null, countdown = 30;
let activeUrl = '';

// ── URL LOADING ──────────────────────────────────────────────────────────────
function loadData() {
  const url = document.getElementById('csv-url').value.trim();
  if (!url) return showError('Please enter a CSV URL.');
  activeUrl = url;
  fetchAndRender();
  startRefresh();
}

async function fetchWithTimeout(url, ms = 10000) {
  const ctrl = new AbortController();
  const t = setTimeout(() => ctrl.abort(), ms);
  try {
    const r = await fetch(url, { signal: ctrl.signal });
    clearTimeout(t);
    return r;
  } catch(e) { clearTimeout(t); throw e; }
}

async function fetchCsv(url) {
  const attempts = [
    () => fetchWithTimeout(url),
    () => fetchWithTimeout(`https://corsproxy.io/?url=${encodeURIComponent(url)}`),
    () => fetchWithTimeout(`https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`),
    () => fetchWithTimeout(`https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`),
  ];
  for (let i = 0; i < attempts.length; i++) {
    try {
      setStatus(`Connecting…`, 'loading');
      const res = await attempts[i]();
      if (!res.ok) continue;
      const text = await res.text();
      if (text.trim().length > 10 && !text.trim().startsWith('<!')) return text;
    } catch(e) { /* next */ }
  }
  throw new Error('Could not reach the CSV URL. Check that it is publicly accessible.');
}

async function fetchAndRender() {
  try {
    showError('');
    const text = await fetchCsv(activeUrl);
    const parsed = parseCsv(text);
    if (!parsed.headers.length || !parsed.rows.length)
      throw new Error('The CSV appears empty or could not be parsed.');
    headers = parsed.headers;
    allRows = parsed.rows;
    render();
    setStatus(`Updated ${new Date().toLocaleTimeString()}`, 'ok');
    document.getElementById('setup-panel').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    document.getElementById('header-right').style.display = 'flex';
  } catch(e) {
    setStatus('Error', 'error');
    showError(e.message);
  }
}

function refreshNow() {
  countdown = 30;
  fetchAndRender();
}

function startRefresh() {
  clearInterval(refreshInterval);
  countdown = 30;
  updateCountdown();
  refreshInterval = setInterval(() => {
    countdown--;
    if (countdown <= 0) { fetchAndRender(); countdown = 30; }
    updateCountdown();
  }, 1000);
}

function updateCountdown() {
  const el = document.getElementById('countdown-text');
  if (el) el.textContent = `${countdown}s`;
}

function resetApp() {
  clearInterval(refreshInterval);
  document.getElementById('setup-panel').style.display = 'block';
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('header-right').style.display = 'none';
  showError('');
  setStatus('', 'ok');
}

function setStatus(msg, state) {
  const txt = document.getElementById('status-text');
  const dot = document.getElementById('status-dot');
  if (txt) txt.textContent = msg;
  if (dot) dot.className = 'status-dot' + (state === 'loading' ? ' loading' : state === 'error' ? ' error' : '');
}

function showError(msg) {
  const el = document.getElementById('error-msg');
  el.textContent = msg;
  el.style.display = msg ? 'block' : 'none';
}

// ── CSV PARSER ───────────────────────────────────────────────────────────────
function parseCsv(text) {
  const lines = text.trim().split(/\r?\n/);
  if (lines.length < 2) return { headers: [], rows: [] };
  function parseRow(line) {
    const cells = []; let cur = ''; let q = false;
    for (const c of line) {
      if (c === '"') { q = !q; continue; }
      if (c === ',' && !q) { cells.push(cur.trim()); cur = ''; continue; }
      cur += c;
    }
    cells.push(cur.trim());
    return cells;
  }
  const hdrs = parseRow(lines[0]);
  const rows = lines.slice(1).filter(l => l.trim()).map(l => {
    const vals = parseRow(l);
    const obj = {};
    hdrs.forEach((h, i) => obj[h] = vals[i] ?? '');
    return obj;
  });
  return { headers: hdrs, rows };
}

// ── HELPERS ──────────────────────────────────────────────────────────────────
function isNum(col) {
  return allRows.some(r => r[col] !== '' && !isNaN(+String(r[col]).replace(/,/g,'')));
}
function toNum(v) { return parseFloat(String(v).replace(/,/g,'')) || 0; }
function numCols() { return headers.filter(isNum); }
function textCol() { return headers.find(h => !isNum(h)) || headers[0]; }

// ── RENDER ───────────────────────────────────────────────────────────────────
function render() {
  renderCards();
  renderThead();
  applySort();
}


// CARDS
function renderCards() {
  const playerCol = textCol();

  // Card 1: Most Survival Wins
  const swVals = allRows.map(r => toNum(r['Survival Wins']));
  const swMax = Math.max(...swVals);
  const swTop = allRows[swVals.indexOf(swMax)]?.[playerCol] || '?';

  // Card 2: Top Kills
  const kVals = allRows.map(r => toNum(r['Kills']));
  const kMax = Math.max(...kVals);
  const kTop = allRows[kVals.indexOf(kMax)]?.[playerCol] || '?';

  // Card 3: Best K.D.A. (Kills / max(1, PvE Deaths + AFK Deaths))
  const kdaVals = allRows.map(r => {
    const k = toNum(r['Kills']);
    const d = toNum(r['PvE Deaths']) + toNum(r['AFK Deaths']);
    return d > 0 ? k / d : k;
  });
  const kdaMax = Math.max(...kdaVals);
  const kdaTop = allRows[kdaVals.indexOf(kdaMax)]?.[playerCol] || '?';

  // Card 4: Total Players
  const total = allRows.length;

  const html = `
    <div class="card">
      <div class="card-label">Most Survival Wins</div>
      <div class="card-value">${swMax.toLocaleString()}</div>
      <div class="card-sub">${swTop}</div>
    </div>
    <div class="card">
      <div class="card-label">Top Kills</div>
      <div class="card-value">${kMax.toLocaleString()}</div>
      <div class="card-sub">${kTop}</div>
    </div>
    <div class="card">
      <div class="card-label">Best K.D.A.</div>
      <div class="card-value">${kdaMax.toFixed(2)}</div>
      <div class="card-sub">${kdaTop}</div>
    </div>
    <div class="card">
      <div class="card-label">Total Players</div>
      <div class="card-value">${total}</div>
      <div class="card-sub">on the board</div>
    </div>`;

  document.getElementById('cards').innerHTML = html;
}



// TABLE HEAD
function renderThead() {
  document.getElementById('thead').innerHTML = `<tr>
    <th onclick="setSort('#')" id="th-rank"># <span class="sort-icon">↕</span></th>
    ${headers.map(h => `<th onclick="setSort('${h}')" id="th-${h.replace(/\W/g,'_')}">${h} <span class="sort-icon">↕</span></th>`).join('')}
    <th>—</th>
  </tr>`;
}

// SORT
function setSort(col) {
  sortAsc = sortCol === col ? !sortAsc : false;
  sortCol = col;
  applySort();
  updateSortIcons();
}

function applySort() {
  let data = [...allRows];
  if (sortCol && sortCol !== '#') {
    data.sort((a, b) => {
      const av = a[sortCol]||'', bv = b[sortCol]||'';
      const an = parseFloat(String(av).replace(/,/g,'')), bn = parseFloat(String(bv).replace(/,/g,''));
      if (!isNaN(an) && !isNaN(bn)) return sortAsc ? an-bn : bn-an;
      return sortAsc ? av.localeCompare(bv) : bv.localeCompare(av);
    });
  }
  renderTbody(data);
}

function updateSortIcons() {
  document.querySelectorAll('thead th').forEach(th => {
    th.classList.remove('sort-active');
    const ic = th.querySelector('.sort-icon');
    if (ic) ic.textContent = '↕';
  });
  const key = (sortCol === '#' ? 'rank' : (sortCol||'').replace(/\W/g,'_'));
  const th = document.getElementById(`th-${key}`);
  if (th) { th.classList.add('sort-active'); const ic = th.querySelector('.sort-icon'); if(ic) ic.textContent = sortAsc ? '↑' : '↓'; }
}

// TABLE BODY
function renderTbody(data) {
  const query = document.getElementById('search-input').value.toLowerCase();
  const filtered = query
    ? data.filter(row => Object.values(row).some(v => String(v).toLowerCase().includes(query)))
    : data;

  document.getElementById('result-count').textContent = `${filtered.length} / ${allRows.length}`;
  document.getElementById('no-results').style.display = filtered.length ? 'none' : 'block';

  const nc = numCols();
  const primaryCol = nc[0];
  const maxVal = primaryCol ? Math.max(...allRows.map(r => toNum(r[primaryCol])), 1) : 1;
  const MEDALS = ['🥇','🥈','🥉'];

  document.getElementById('tbody').innerHTML = filtered.map((row, i) => {
    const rankCell = i < 3
      ? `<span class="medal">${MEDALS[i]}</span>`
      : `<span style="color:var(--muted)">${i+1}</span>`;
    const cells = headers.map(h => {
      if (isNum(h)) return `<td class="td-num">${Number(row[h]).toLocaleString()}</td>`;
      const playerName = row[h] || '—';
      const skinUrl = `https://minotar.net/avatar/${encodeURIComponent(playerName)}/20`;
      const nameLink = playerName !== '—'
        ? `<a href="https://namemc.com/profile/${encodeURIComponent(playerName)}" target="_blank" rel="noopener" class="player-link">${playerName}</a>`
        : playerName;
      return `<td class="td-player"><div class="td-player-inner"><img src="${skinUrl}" alt="" onerror="this.src='https://mc-heads.net/avatar/'+encodeURIComponent('${playerName}')+'/20'; this.onerror=function(){this.style.display='none'}">${nameLink}</div></td>`;
    }).join('');
    const barPct = primaryCol ? (toNum(row[primaryCol]) / maxVal * 100).toFixed(1) : 0;
    return `<tr>
      <td class="td-rank">${rankCell}</td>
      ${cells}
      <td class="td-bar"><div class="bar-track"><div class="bar-fill" style="width:${barPct}%"></div></div></td>
    </tr>`;
  }).join('');
}

function filterTable() { applySort(); }

// ── DEMO ─────────────────────────────────────────────────────────────────────
function loadDemo() {
  headers = ['Player','Kills','Wins','Deaths','KD'];
  allRows = [
    {Player:'Technoblade',Kills:'531',Wins:'120',Deaths:'22',KD:'24.1'},
    {Player:'Dream',      Kills:'412',Wins:'98', Deaths:'45',KD:'9.2'},
    {Player:'OffsetBloom',Kills:'342',Wins:'87', Deaths:'54',KD:'6.3'},
    {Player:'Herobrine',  Kills:'289',Wins:'72', Deaths:'61',KD:'4.7'},
    {Player:'Jeb_',       Kills:'201',Wins:'55', Deaths:'80',KD:'2.5'},
    {Player:'xNestorio',  Kills:'145',Wins:'38', Deaths:'102',KD:'1.4'},
    {Player:'Grian',      Kills:'98', Wins:'25', Deaths:'134',KD:'0.7'},
    {Player:'Mumbo',      Kills:'61', Wins:'14', Deaths:'189',KD:'0.3'},
  ];
  document.getElementById('csv-url').value = '(demo data)';
  render();
  document.getElementById('setup-panel').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';
  document.getElementById('header-right').style.display = 'flex';
  setStatus('Demo mode', 'ok');
  const _ct = document.getElementById('countdown-text'); if(_ct) _ct.textContent = '';
}

// ── AUTO-LOAD ─────────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  headers = ['Player', 'Games Played', 'Survival Wins', 'Team Wins', 'Kills', 'PvP Deaths', 'PvE Deaths'];
  allRows = [
    {Player:'OffsetBloom',   'Games Played':'84',  'Survival Wins':'0', 'Team Wins':'0', Kills:'12',  'PvP Deaths':'0', 'PvE Deaths':'24'},
    {Player:'nootherchoice', 'Games Played':'72',  'Survival Wins':'0', 'Team Wins':'0', Kills:'0',   'PvP Deaths':'0', 'PvE Deaths':'0'},
    {Player:'mickae',        'Games Played':'120', 'Survival Wins':'0', 'Team Wins':'0', Kills:'180', 'PvP Deaths':'0', 'PvE Deaths':'60'},
  ];
  render();
  document.getElementById('setup-panel').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';
  document.getElementById('header-right').style.display = 'flex';
  setStatus('Loaded', 'ok');
  const _ct = document.getElementById('countdown-text'); if(_ct) _ct.textContent = '';
});


// ── SQLITE DB LOADING ─────────────────────────────────────────────────────────
let dbInstance = null;

async function loadDbFile(event) {
  const file = event.target.files[0];
  if (!file) return;
  showError('');
  try {
    const SQL = await initSqlJs({
      locateFile: file => `https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.2/${file}`
    });
    const buf = await file.arrayBuffer();
    dbInstance = new SQL.Database(new Uint8Array(buf));

    // Get all table names
    const res = dbInstance.exec("SELECT name FROM sqlite_master WHERE type='table' AND name NOT LIKE 'sqlite_%'");
    if (!res.length || !res[0].values.length) {
      showError('No tables found in this database file.');
      return;
    }
    const tables = res[0].values.map(r => r[0]);

    const sel = document.getElementById('table-select');
    sel.innerHTML = '<option value="">— Select a table —</option>' +
      tables.map(t => `<option value="${t}">${t}</option>`).join('');
    document.getElementById('table-select-wrap').style.display = 'block';

    // Auto-select if only one table
    if (tables.length === 1) {
      sel.value = tables[0];
      loadTableFromDb();
    }
  } catch(e) {
    showError('Failed to read .db file: ' + e.message);
  }
}

function loadTableFromDb() {
  const table = document.getElementById('table-select').value;
  if (!table || !dbInstance) return;
  try {
    const res = dbInstance.exec(`SELECT * FROM "${table}"`);
    if (!res.length) { showError('Table is empty.'); return; }
    headers = res[0].columns;
    allRows = res[0].values.map(row => {
      const obj = {};
      headers.forEach((h, i) => obj[h] = row[i] !== null ? String(row[i]) : '');
      return obj;
    });

    // Rename columns to friendly names
    const colMap = {
      player_name: 'Player', stats_gamesplayed: 'Games Played',
      stats_playerkills: 'Kills', stats_deathtopve2: '_pve_a',
      stats_deathtopve: '_pve_b', stats_deathpvp: 'PvP Deaths', stats_deathtopvp: 'PvP Deaths',
      stats_deathafk: '_drop', stats_firstdmg: '_drop',
      stats_lastdmg: '_drop', stats_rebooted: '_drop',
      stats_respawned: '_drop', stats_survivalwins: 'Survival Wins',
      stats_teamwins: 'Team Wins', stats_firstgold: '_drop'
    };
    const keepCols = ['Player', 'Games Played', 'Survival Wins', 'Team Wins', 'Kills', 'PvP Deaths', 'PvE Deaths'];
    // Remap rows, sum pve1+pve2, keep only wanted columns
    allRows = allRows.map(row => {
      const newRow = {};
      Object.keys(row).forEach(k => { newRow[colMap[k] || k] = row[k]; });
      const a = parseFloat(newRow['_pve_a'] || 0);
      const b = parseFloat(newRow['_pve_b'] || 0);
      newRow['PvE Deaths'] = String(a + b);
      // Keep only desired columns
      const filtered = {};
      keepCols.forEach(c => { if (newRow[c] !== undefined) filtered[c] = newRow[c]; });
      return filtered;
    });
    headers = keepCols.filter(c => allRows.some(r => r[c] !== undefined));

    render();
    document.getElementById('setup-panel').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    setStatus(`Loaded from .db: ${table}`, 'ok');
    const _ct = document.getElementById('countdown-text'); if(_ct) _ct.textContent = '';
    // No auto-refresh for DB files
    clearInterval(refreshInterval);
  } catch(e) {
    showError('Failed to query table: ' + e.message);
  }
}

// ── DARK MODE ─────────────────────────────────────────────────────────────────
function toggleTheme() {
  const html = document.documentElement;
  const isDark = html.getAttribute('data-theme') === 'dark';
  html.setAttribute('data-theme', isDark ? 'light' : 'dark');
  document.getElementById('theme-toggle').textContent = isDark ? '🌑 Dark' : '☀ Light';
}
</script>
