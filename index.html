<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MinionUHC Stats</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.2/sql-wasm.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --font: Arial, Helvetica, sans-serif;
}

/* LIGHT MODE */
html[data-theme="light"] {
  --bg:      #f4f3f1;
  --surface: #eeecea;
  --border:  #d8d5d0;
  --text:    #1a1a1a;
  --muted:   #8a8680;
}

/* DARK MODE (default) */
html[data-theme="dark"] {
  --bg:      #141414;
  --surface: #1e1e1e;
  --border:  #2e2e2e;
  --text:    #e8e8e8;
  --muted:   #888888;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  font-size: 14px;
  line-height: 1.5;
}

#app { max-width: 1100px; margin: 0 auto; padding: 0 1.5rem 4rem; }

/* HEADER */
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 1.5rem 0 1rem;
  border-bottom: 1px solid var(--border);
  margin-bottom: 2rem;
  flex-wrap: wrap;
  gap: 0.75rem;
}
.logo { display: flex; align-items: center; gap: 0.5rem; }
.logo-icon { font-size: 18px; }
.logo-text { font-size: 1.1rem; font-weight: bold; letter-spacing: -0.3px; }
.logo-text span { color: var(--muted); font-weight: normal; }
.logo-season {
  font-size: 11px;
  font-weight: bold;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--muted);
  border: 1px solid var(--border);
  padding: 0.15rem 0.5rem;
  border-radius: 3px;
  margin-left: 0.25rem;
  white-space: nowrap;
}

.header-right { display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap; margin-left: auto; }
.header-left { display: flex; align-items: center; gap: 0.5rem; }
.status-pill {
  display: flex; align-items: center; gap: 0.4rem;
  border: 1px solid var(--border);
  padding: 0.3rem 0.75rem;
  font-size: 12px;
  color: var(--muted);
}
.status-dot { width: 6px; height: 6px; border-radius: 50%; background: #111; flex-shrink: 0; }
.status-dot.loading { animation: pulse 1s ease infinite; }
.status-dot.error { background: #888; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.2} }

/* BUTTONS */
.btn {
  font-family: var(--font);
  font-size: 13px;
  padding: 0.4rem 0.9rem;
  border: 1px solid #1a1a1a;
  border-radius: 4px;
  cursor: pointer;
  background: var(--bg);
  color: #1a1a1a;
  transition: background 0.15s, color 0.15s;
}
.btn:hover { background: #111; color: #fff; }
.btn-primary { background: #111; color: #fff; }
.btn-primary:hover { background: #444; }
.btn:active { opacity: 0.7; }
.btn-ghost { background: var(--bg); color: var(--muted); border-color: var(--border); }
.btn-ghost:hover { background: #111; color: #fff; border-color: #111; }

/* SEASONS DROPDOWN */
.seasons-wrapper {
  position: relative;
}
.seasons-btn {
  font-family: var(--font);
  font-size: 13px;
  padding: 0.4rem 0.75rem;
  border: 1px solid var(--border);
  border-radius: 4px;
  cursor: pointer;
  background: var(--bg);
  color: var(--muted);
  display: flex;
  align-items: center;
  gap: 0.4rem;
  white-space: nowrap;
  transition: background 0.15s, color 0.15s, border-color 0.15s;
}
.seasons-btn:hover { background: #111; color: #fff; border-color: #111; }
.seasons-btn .chevron {
  font-size: 10px;
  transition: transform 0.15s;
  display: inline-block;
}
.seasons-btn.open .chevron { transform: rotate(180deg); }
.seasons-dropdown {
  display: none;
  position: absolute;
  top: calc(100% + 6px);
  right: 0;
  min-width: 160px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  z-index: 100;
  overflow: hidden;
  box-shadow: 0 4px 16px rgba(0,0,0,0.18);
}
.seasons-dropdown.open { display: block; }
.seasons-dropdown-header {
  padding: 0.5rem 0.85rem;
  font-size: 10px;
  font-weight: bold;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--muted);
  border-bottom: 1px solid var(--border);
}
.season-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0.55rem 0.85rem;
  font-size: 13px;
  color: var(--text);
  cursor: pointer;
  transition: background 0.12s;
  gap: 0.5rem;
  text-decoration: none;
}
.season-item:hover { background: var(--border); }
.season-item.current {
  color: var(--muted);
  cursor: default;
  pointer-events: none;
}
.season-item.current:hover { background: transparent; }
.season-badge {
  font-size: 10px;
  padding: 0.1rem 0.4rem;
  border-radius: 3px;
  border: 1px solid var(--border);
  color: var(--muted);
  white-space: nowrap;
}
.season-badge.active {
  border-color: #444;
  color: var(--muted);
}

/* ERROR */
#error-msg {
  display: none;
  border: 1px solid #111;
  padding: 0.75rem 1rem;
  font-size: 13px;
  color: #111;
  margin-bottom: 1.5rem;
  background: var(--surface);
}

/* DASHBOARD */
#dashboard { display: none; }
@keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }

/* CARDS */
.cards {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 1px;
  border: 1px solid var(--border);
  border-radius: 6px;
  margin-bottom: 2rem;
  background: var(--border);
  overflow: hidden;
}
.card {
  background: var(--surface);
  padding: 1.25rem;
}
.card-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); margin-bottom: 0.4rem; }
.card-value { font-size: 1.8rem; font-weight: bold; line-height: 1; margin-bottom: 0.3rem; }
.card-sub { font-size: 11px; color: var(--muted); }

/* SECTION */
.section { border: 1px solid var(--border); border-radius: 6px; margin-bottom: 2rem; overflow: hidden; }
.section-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0.75rem 1rem;
  border-bottom: 1px solid var(--border);
  flex-wrap: wrap; gap: 0.5rem;
}
.section-title { font-size: 11px; font-weight: bold; text-transform: uppercase; letter-spacing: 0.07em; color: var(--muted); }

/* CHARTS */
.charts-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 0; }
.chart-box { position: relative; height: 220px; padding: 1rem; border-right: 1px solid var(--border); }
.chart-box:last-child { border-right: none; }
.chart-label { font-size: 11px; font-weight: bold; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); margin-bottom: 0.5rem; }

/* TABLE */
.table-controls { display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap; }
.search-wrap { position: relative; flex: 1; min-width: 160px; }
.search-icon { position: absolute; left: 0.6rem; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 13px; pointer-events: none; }
#search-input {
  width: 100%; background: var(--bg); border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--text); font-family: var(--font); font-size: 13px;
  padding: 0.4rem 0.6rem 0.4rem 2rem; outline: none;
}
#search-input:focus { border-color: #111; }
#search-input::placeholder { color: var(--muted); }
.result-count { font-size: 12px; color: var(--muted); white-space: nowrap; }

.table-wrap { overflow-x: auto; position: relative; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }

thead th {
  text-align: left; padding: 0.6rem 1rem;
  font-size: 11px; font-weight: bold; text-transform: uppercase;
  letter-spacing: 0.06em; color: var(--muted);
  border-bottom: 1px solid var(--border);
  cursor: pointer; white-space: nowrap; user-select: none;
  background: var(--surface);
}
thead th:nth-child(1) {
  position: sticky; left: 0; z-index: 3;
  box-shadow: 2px 0 4px rgba(0,0,0,0.06);
}
thead th:nth-child(2) {
  position: sticky; left: 44px; z-index: 3; min-width: 140px;
  box-shadow: 2px 0 4px rgba(0,0,0,0.06);
}
thead th:hover { color: var(--text); }
thead th.sort-active { color: var(--text); }
.sort-icon { margin-left: 3px; font-size: 10px; opacity: 0.4; }
thead th.sort-active .sort-icon { opacity: 1; }

tbody tr { border-bottom: 1px solid var(--border); }
tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: var(--surface); }
tbody tr:hover .td-rank,
tbody tr:hover .td-player { background: var(--surface); }
tbody td { padding: 0.65rem 1rem; vertical-align: middle; }

.td-rank {
  width: 44px; font-size: 12px; color: var(--muted); text-align: center;
  position: sticky; left: 0; z-index: 2; background: var(--surface);
  box-shadow: 2px 0 4px rgba(0,0,0,0.06);
}
.medal { font-size: 14px; }
.td-player {
  font-weight: bold;
  position: sticky; left: 44px; z-index: 2; background: var(--surface);
  min-width: 140px; box-shadow: 2px 0 4px rgba(0,0,0,0.06);
}
.td-player-inner { display: flex; align-items: center; gap: 0.5rem; }
.player-link { color: inherit; text-decoration: none; }
.player-link:hover { text-decoration: underline; opacity: 0.8; }
.td-player-inner img { width: 20px; height: 20px; border-radius: 2px; image-rendering: pixelated; flex-shrink: 0; }
.td-num { text-align: right; font-family: monospace; font-size: 13px; }

#no-results { display: none; padding: 2.5rem; text-align: center; color: var(--muted); font-size: 13px; }

::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); }

/* SOCIAL LINKS */
.social-links { display: flex; align-items: center; gap: 0.5rem; }
.social-btn {
  display: flex; align-items: center; justify-content: center;
  width: 32px; height: 32px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--muted);
  text-decoration: none;
  transition: color 0.15s, border-color 0.15s, background 0.15s;
  flex-shrink: 0;
}
.social-btn:hover { border-color: var(--text); color: var(--text); background: var(--bg); }
.social-btn svg { width: 16px; height: 16px; fill: currentColor; }
</style>
</head>
<body>
<div id="app">

  <header>
    <div class="logo">
      <img src="https://mc-heads.net/avatar/DavidBry/30" style="width:30px;height:30px;border-radius:4px;flex-shrink:0;image-rendering:pixelated;" alt="MinionUHC" />
      <div class="logo-text">Minion<span>UHC</span></div>
      <div class="logo-season">Season 1</div>
    </div>
    <div class="header-right" id="header-right" style="display:flex">
      
  <!-- ERROR -->
  <div id="error-msg"></div>

  <!-- LOADING STATE -->
  <div id="setup-panel" style="text-align:center;padding:4rem 0;color:var(--muted);font-size:13px;">
    <div id="loading-msg">Loading stats…</div>
  </div>

  <!-- DASHBOARD -->
  <div id="dashboard">
    <div class="cards" id="cards"></div>

    <div class="section">
      <div class="section-header">
        <div style="display:flex;align-items:center;gap:0.75rem;flex-wrap:wrap;">
          <div class="section-title">Leaderboard</div>
          <span id="last-updated" style="font-size:11px;color:var(--muted);letter-spacing:0.03em;"></span>
        </div>
        <div class="table-controls">
          <div class="search-wrap">
            <span class="search-icon">⌕</span>
            <input id="search-input" type="text" placeholder="Search players…" oninput="filterTable()"/>
          </div>
          <span class="result-count" id="result-count"></span>
        </div>
      </div>
      <div class="table-wrap">
        <table>
          <thead id="thead"></thead>
          <tbody id="tbody"></tbody>
        </table>
        <div id="no-results">No players match your search.</div>
      </div>
    </div>
  </div>

</div>
<script>
// ── STATE ────────────────────────────────────────────────────────────────────
let allRows = [], headers = [], sortCol = 'Survival Wins', sortAsc = false;

// ── HELPERS ──────────────────────────────────────────────────────────────────
function setStatus(msg, state) {
  const txt = document.getElementById('status-text');
  const dot = document.getElementById('status-dot');
  if (txt) txt.textContent = msg;
  if (dot) dot.className = 'status-dot' + (state === 'loading' ? ' loading' : state === 'error' ? ' error' : '');
}

function showError(msg) {
  const el = document.getElementById('error-msg');
  if (!el) return;
  el.textContent = msg;
  el.style.display = msg ? 'block' : 'none';
}


function isNum(col) {
  return allRows.some(r => r[col] !== '' && !isNaN(+String(r[col]).replace(/,/g,'')));
}
function toNum(v) { return parseFloat(String(v).replace(/,/g,'')) || 0; }
function numCols() { return headers.filter(isNum); }
function textCol() { return headers.find(h => !isNum(h)) || headers[0]; }

// ── RENDER ───────────────────────────────────────────────────────────────────
function render() {
  renderCards();
  renderThead();
  applySort();
}

// CARDS
function renderCards() {
  const playerCol = textCol();
 
  // Card 1: Most Survival Wins
  const swVals = allRows.map(r => toNum(r['Survival Wins']));
  const swMax = Math.max(...swVals);
  const swTop = allRows[swVals.indexOf(swMax)]?.[playerCol] || '?';
 
  // Card 2: Top Kills
  const kVals = allRows.map(r => toNum(r['Kills']));
  const kMax = Math.max(...kVals);
  const kTop = allRows[kVals.indexOf(kMax)]?.[playerCol] || '?';
 
  // Card 3: Best K.D.A. (Kills / max(1, PvE Deaths + AFK Deaths))
  const kdaVals = allRows.map(r => {
    const k = toNum(r['Kills']);
    const d = toNum(r['PvE Deaths']) + toNum(r['AFK Deaths']);
    return d > 0 ? k / d : k;
  });
  const kdaMax = Math.max(...kdaVals);
  const kdaTop = allRows[kdaVals.indexOf(kdaMax)]?.[playerCol] || '?';
 
  // Card 4: Total Players
  const total = allRows.length;
 
  const html = `
    <div class="card">
      <div class="card-label">Most Survival Wins</div>
      <div class="card-value">${swMax.toLocaleString()}</div>
      <div class="card-sub" style="display:flex;align-items:center;gap:0.35rem;">
        <img src="https://mc-heads.net/avatar/${encodeURIComponent(swTop)}/16" style="width:16px;height:16px;border-radius:2px;image-rendering:pixelated;flex-shrink:0;" onerror="this.style.display='none'" />${swTop}
      </div>
    </div>
    <div class="card">
      <div class="card-label">Top Kills</div>
      <div class="card-value">${kMax.toLocaleString()}</div>
      <div class="card-sub" style="display:flex;align-items:center;gap:0.35rem;">
        <img src="https://mc-heads.net/avatar/${encodeURIComponent(kTop)}/16" style="width:16px;height:16px;border-radius:2px;image-rendering:pixelated;flex-shrink:0;" onerror="this.style.display='none'" />${kTop}
      </div>
    </div>
    <div class="card">
      <div class="card-label">Best K/D</div>
      <div class="card-value">${kdaMax.toFixed(2)}</div>
      <div class="card-sub" style="display:flex;align-items:center;gap:0.35rem;">
        <img src="https://mc-heads.net/avatar/${encodeURIComponent(kdaTop)}/16" style="width:16px;height:16px;border-radius:2px;image-rendering:pixelated;flex-shrink:0;" onerror="this.style.display='none'" />${kdaTop}
      </div>
    </div>
    <div class="card">
      <div class="card-label">Total Players</div>
      <div class="card-value">${total}</div>
    </div>`;
 
  document.getElementById('cards').innerHTML = html;
}

// TABLE HEAD
function renderThead() {
  document.getElementById('thead').innerHTML = `<tr>
    <th onclick="setSort('#')" id="th-rank"># <span class="sort-icon">↕</span></th>
    ${headers.map(h => `<th onclick="setSort('${h}')" id="th-${h.replace(/\W/g,'_')}">${h} <span class="sort-icon">↕</span></th>`).join('')}
  </tr>`;
}

// SORT
function setSort(col) {
  sortAsc = sortCol === col ? !sortAsc : false;
  sortCol = col;
  applySort();
  updateSortIcons();
}

function applySort() {
  let data = [...allRows];
  if (sortCol && sortCol !== '#') {
    data.sort((a, b) => {
      const av = a[sortCol]||'', bv = b[sortCol]||'';
      const an = parseFloat(String(av).replace(/,/g,'')), bn = parseFloat(String(bv).replace(/,/g,''));
      if (!isNaN(an) && !isNaN(bn)) return sortAsc ? an-bn : bn-an;
      return sortAsc ? av.localeCompare(bv) : bv.localeCompare(av);
    });
  }
  renderTbody(data);
}

function updateSortIcons() {
  document.querySelectorAll('thead th').forEach(th => {
    th.classList.remove('sort-active');
    const ic = th.querySelector('.sort-icon');
    if (ic) ic.textContent = '↕';
  });
  const key = (sortCol === '#' ? 'rank' : (sortCol||'').replace(/\W/g,'_'));
  const th = document.getElementById(`th-${key}`);
  if (th) { th.classList.add('sort-active'); const ic = th.querySelector('.sort-icon'); if(ic) ic.textContent = sortAsc ? '↑' : '↓'; }
}

// TABLE BODY
function renderTbody(data) {
  const query = document.getElementById('search-input').value.toLowerCase();
  const filtered = query
    ? data.filter(row => Object.values(row).some(v => String(v).toLowerCase().includes(query)))
    : data;

  document.getElementById('result-count').textContent = `${filtered.length} / ${allRows.length}`;
  document.getElementById('no-results').style.display = filtered.length ? 'none' : 'block';

  const MEDALS = ['🥇','🥈','🥉'];

  // Use global sorted order to determine rank, filter is just a visual subset
  const sortedAll = data; // data is already sorted by applySort
  document.getElementById('tbody').innerHTML = filtered.map((row) => {
    const rank = sortedAll.indexOf(row);
    const rankCell = rank < 3
      ? `<span class="medal">${MEDALS[rank]}</span>`
      : `<span style="color:var(--muted)">${rank+1}</span>`;
    const cells = headers.map(h => {
      if (isNum(h)) return `<td class="td-num">${Number(row[h]).toLocaleString()}</td>`;
      const playerName = row[h] || '—';
      const skinUrl = `https://minotar.net/helm/${encodeURIComponent(playerName)}/20`;
      const nameLink = playerName !== '—'
        ? `<a href="https://namemc.com/profile/${encodeURIComponent(playerName)}" target="_blank" rel="noopener" class="player-link">${playerName}</a>`
        : playerName;
      return `<td class="td-player"><div class="td-player-inner"><img src="${skinUrl}" alt="" onerror="this.src='https://mc-heads.net/avatar/'+encodeURIComponent('${playerName}')+'/20'; this.onerror=function(){this.style.display='none'}">${nameLink}</div></td>`;
    }).join('');
    return `<tr>
      <td class="td-rank">${rankCell}</td>
      ${cells}
    </tr>`;
  }).join('');
}

function filterTable() { applySort(); }

// ── GITHUB CONFIG ─────────────────────────────────────────────────────────────
// Edit these three lines to point to your repo:
const GH_USER   = 'vastri1';
const GH_REPO   = 'vastri.github.io';
const GH_BRANCH = 'main';
const GH_DB_PATH = 'stats.db';

// ── SQLITE DB LOADING FROM GITHUB ─────────────────────────────────────────────
let dbInstance = null;

async function loadDbFromGitHub() {
  setStatus('Loading stats…', 'loading');
  showError('');

  const rawUrl = `https://raw.githubusercontent.com/${GH_USER}/${GH_REPO}/${GH_BRANCH}/${GH_DB_PATH}`;

  try {
    // Fetch the binary .db file
    const res = await fetch(rawUrl);
    if (!res.ok) throw new Error(`GitHub returned ${res.status}. Make sure stats.db is uploaded to your repo.`);
    const buf = await res.arrayBuffer();

    const SQL = await initSqlJs({
      locateFile: f => `https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.2/${f}`
    });
    dbInstance = new SQL.Database(new Uint8Array(buf));
    loadTableFromDb();
  } catch(e) {
    setStatus('Error', 'error');
    const loadingMsg = document.getElementById('loading-msg');
    if (loadingMsg) loadingMsg.innerHTML = `
      <div style="font-size:1.1rem;font-weight:bold;color:var(--text);margin-bottom:0.5rem;">⚠ Could not load stats.db</div>
      <div style="margin-bottom:1rem;">${e.message}</div>
      <div style="font-size:12px;">Make sure <code style="background:var(--surface);padding:1px 5px;border:1px solid var(--border);">stats.db</code> is uploaded to your GitHub repo, then refresh the page.</div>
    `;
  }

  // Also fetch the last-commit date from GitHub API
  fetchLastUpdated();
}

async function fetchLastUpdated() {
  try {
    const apiUrl = `https://api.github.com/repos/${GH_USER}/${GH_REPO}/commits?path=${GH_DB_PATH}&per_page=1`;
    const res = await fetch(apiUrl, { headers: { Accept: 'application/vnd.github+json' } });
    if (!res.ok) return;
    const data = await res.json();
    if (data && data[0] && data[0].commit && data[0].commit.committer) {
      const iso = data[0].commit.committer.date;
      const d = new Date(iso);
      const label = d.toLocaleDateString(undefined, { year:'numeric', month:'short', day:'numeric' });
      const el = document.getElementById('last-updated');
      if (el) el.textContent = `Stats last updated: ${label}`;
    }
  } catch(_) { /* silently ignore */ }
}

function loadTableFromDb() {
  if (!dbInstance) return;
  try {
    // Get all table names
    const tableRes = dbInstance.exec("SELECT name FROM sqlite_master WHERE type='table' AND name NOT LIKE 'sqlite_%'");
    if (!tableRes.length || !tableRes[0].values.length) {
      showError('No tables found in the database file.');
      return;
    }
    // Auto-use first table
    const table = tableRes[0].values[0][0];

    const res = dbInstance.exec(`SELECT * FROM "${table}"`);
    if (!res.length) { showError('Table is empty.'); return; }
    let hdrs = res[0].columns;
    let rows = res[0].values.map(row => {
      const obj = {};
      hdrs.forEach((h, i) => obj[h] = row[i] !== null ? String(row[i]) : '');
      return obj;
    });

    // Rename columns to friendly names
    const colMap = {
      player_name: 'Player', stats_gamesplayed: 'Games Played',
      stats_playerkills: 'Kills', stats_deathtopve2: '_pve_a',
      stats_deathtopve: '_pve_b', stats_deathpvp: 'PvP Deaths', stats_deathtopvp: 'PvP Deaths',
      stats_deathafk: '_drop', stats_firstdmg: '_drop',
      stats_lastdmg: '_drop', stats_rebooted: '_drop',
      stats_respawned: '_drop', stats_survivalwins: 'Survival Wins',
      stats_teamwins: 'Team Wins', stats_firstgold: '_drop'
    };
    const keepCols = ['Player', 'Games Played', 'Survival Wins', 'Team Wins', 'Kills', 'PvP Deaths', 'PvE Deaths'];
    rows = rows.map(row => {
      const newRow = {};
      Object.keys(row).forEach(k => { newRow[colMap[k] || k] = row[k]; });
      const a = parseFloat(newRow['_pve_a'] || 0);
      const b = parseFloat(newRow['_pve_b'] || 0);
      newRow['PvE Deaths'] = String(a + b);
      const filtered = {};
      keepCols.forEach(c => { if (newRow[c] !== undefined) filtered[c] = newRow[c]; });
      return filtered;
    });
    headers = keepCols.filter(c => rows.some(r => r[c] !== undefined));
    allRows = rows;

    render();
    document.getElementById('setup-panel').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    document.getElementById('header-right').style.display = 'flex';
    setStatus('Loaded', 'ok');
  } catch(e) {
    // silently ignore query errors
  }
}

// ── AUTO-LOAD ─────────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  loadDbFromGitHub();
});

// ── DARK MODE ─────────────────────────────────────────────────────────────────
function toggleTheme() {
  const html = document.documentElement;
  const isDark = html.getAttribute('data-theme') === 'dark';
  const newTheme = isDark ? 'light' : 'dark';
  html.setAttribute('data-theme', newTheme);
  document.getElementById('theme-toggle').textContent = isDark ? '☼ Dark' : '☀ Light';
  localStorage.setItem('minionuhc-theme', newTheme);
}

// Apply saved theme immediately (before page renders)
(function() {
  const saved = localStorage.getItem('minionuhc-theme');
  if (saved) document.documentElement.setAttribute('data-theme', saved);
  window.addEventListener('DOMContentLoaded', function() {
    const btn = document.getElementById('theme-toggle');
    if (btn) {
      const theme = document.documentElement.getAttribute('data-theme');
      btn.textContent = theme === 'dark' ? '☀ Light' : '☼ Dark';
    }
  });
})();

// ── SEASONS DROPDOWN ──────────────────────────────────────────────────────────
function toggleSeasons() {
  const btn = document.getElementById('seasons-btn');
  const dropdown = document.getElementById('seasons-dropdown');
  const isOpen = dropdown.classList.contains('open');
  if (isOpen) {
    dropdown.classList.remove('open');
    btn.classList.remove('open');
  } else {
    dropdown.classList.add('open');
    btn.classList.add('open');
  }
}

// Close dropdown when clicking outside
document.addEventListener('click', function(e) {
  const wrapper = document.getElementById('seasons-wrapper');
  if (wrapper && !wrapper.contains(e.target)) {
    document.getElementById('seasons-dropdown').classList.remove('open');
    document.getElementById('seasons-btn').classList.remove('open');
  }
});
</script>
