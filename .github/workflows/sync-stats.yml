name: Sync stats.db

on:
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Download stats.db via FTP
  run: |
    curl --ftp-ssl --disable-epsv \
    -u "${{ secrets.FTP_USER }}:${{ secrets.FTP_PASS }}" \
    "ftp://${{ secrets.FTP_HOST }}:${{ secrets.FTP_PORT }}/default/config/minion/stats.db" \
    -o stats.db

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add stats.db
          git diff --staged --quiet || git commit -m "auto update stats"
          git push
