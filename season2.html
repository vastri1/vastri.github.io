<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MinionUHC Stats — Season 2</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root { --font: Arial, Helvetica, sans-serif; }

html[data-theme="light"] {
  --bg:      #f4f3f1;
  --surface: #eeecea;
  --border:  #d8d5d0;
  --text:    #1a1a1a;
  --muted:   #8a8680;
}
html[data-theme="dark"] {
  --bg:      #141414;
  --surface: #1e1e1e;
  --border:  #2e2e2e;
  --text:    #e8e8e8;
  --muted:   #888888;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  font-size: 14px;
  line-height: 1.5;
}

#app { max-width: 1100px; margin: 0 auto; padding: 0 1.5rem 4rem; }

/* HEADER */
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 1.5rem 0 1rem;
  border-bottom: 1px solid var(--border);
  margin-bottom: 2rem;
  flex-wrap: wrap;
  gap: 0.75rem;
}
.logo { display: flex; align-items: center; gap: 0.5rem; }
.logo-text { font-size: 1.1rem; font-weight: bold; letter-spacing: -0.3px; }
.logo-text span { color: var(--muted); font-weight: normal; }
.logo-season {
  font-size: 11px;
  font-weight: bold;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--muted);
  border: 1px solid var(--border);
  padding: 0.15rem 0.5rem;
  border-radius: 3px;
  margin-left: 0.25rem;
  white-space: nowrap;
}
.season2-badge {
  border-color: #111 !important;
  color: #111 !important;
}

.header-right { display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap; margin-left: auto; }

/* BUTTONS */
.btn {
  font-family: var(--font);
  font-size: 13px;
  padding: 0.4rem 0.9rem;
  border: 1px solid var(--border);
  border-radius: 4px;
  cursor: pointer;
  background: var(--bg);
  color: var(--muted);
  transition: background 0.15s, color 0.15s, border-color 0.15s;
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  gap: 0.35rem;
}
.btn:hover { background: #111; color: #fff; border-color: #111; }
.btn-ghost { background: var(--bg); color: var(--muted); border-color: var(--border); }
.btn-ghost:hover { background: #111; color: #fff; border-color: #111; }

/* SEASONS DROPDOWN */
.seasons-wrapper { position: relative; }
.seasons-btn {
  font-family: var(--font);
  font-size: 13px;
  padding: 0.4rem 0.75rem;
  border: 1px solid var(--border);
  border-radius: 4px;
  cursor: pointer;
  background: var(--bg);
  color: var(--muted);
  display: flex;
  align-items: center;
  gap: 0.4rem;
  white-space: nowrap;
  transition: background 0.15s, color 0.15s, border-color 0.15s;
}
.seasons-btn:hover { background: #111; color: #fff; border-color: #111; }
.seasons-btn .chevron { font-size: 10px; transition: transform 0.15s; display: inline-block; }
.seasons-btn.open .chevron { transform: rotate(180deg); }
.seasons-dropdown {
  display: none;
  position: absolute;
  top: calc(100% + 6px);
  right: 0;
  min-width: 160px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  z-index: 100;
  overflow: hidden;
  box-shadow: 0 4px 16px rgba(0,0,0,0.18);
}
.seasons-dropdown.open { display: block; }
.seasons-dropdown-header {
  padding: 0.5rem 0.85rem;
  font-size: 10px;
  font-weight: bold;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--muted);
  border-bottom: 1px solid var(--border);
}
.season-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0.55rem 0.85rem;
  font-size: 13px;
  color: var(--text);
  cursor: pointer;
  transition: background 0.12s;
  gap: 0.5rem;
  text-decoration: none;
}
.season-item:hover { background: var(--border); }
.season-item.current { color: var(--muted); cursor: default; pointer-events: none; }
.season-item.current:hover { background: transparent; }
.season-badge {
  font-size: 10px;
  padding: 0.1rem 0.4rem;
  border-radius: 3px;
  border: 1px solid var(--border);
  color: var(--muted);
  white-space: nowrap;
}
.season-badge.active { border-color: #111; color: #111; }

/* ARCHIVE BANNER */
.archive-banner {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 0.75rem 1rem;
  margin-bottom: 2rem;
  font-size: 13px;
  color: var(--muted);
}
.archive-banner strong { color: var(--text); }
.archive-icon { font-size: 16px; flex-shrink: 0; }

/* CARDS */
.cards {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 1px;
  border: 1px solid var(--border);
  border-radius: 6px;
  margin-bottom: 2rem;
  background: var(--border);
  overflow: hidden;
}
.card { background: var(--surface); padding: 1.25rem; }
.card-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); margin-bottom: 0.4rem; }
.card-value { font-size: 1.8rem; font-weight: bold; line-height: 1; margin-bottom: 0.3rem; }
.card-sub { font-size: 11px; color: var(--muted); display: flex; align-items: center; gap: 0.35rem; }
.card-sub img { width: 16px; height: 16px; border-radius: 2px; image-rendering: pixelated; flex-shrink: 0; }

/* SECTION */
.section { border: 1px solid var(--border); border-radius: 6px; margin-bottom: 2rem; overflow: hidden; }
.section-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0.75rem 1rem;
  border-bottom: 1px solid var(--border);
  flex-wrap: wrap; gap: 0.5rem;
}
.section-title { font-size: 11px; font-weight: bold; text-transform: uppercase; letter-spacing: 0.07em; color: var(--muted); }

/* TABLE */
.table-controls { display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap; }
.search-wrap { position: relative; flex: 1; min-width: 160px; }
.search-icon { position: absolute; left: 0.6rem; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 13px; pointer-events: none; }
#search-input {
  width: 100%; background: var(--bg); border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--text); font-family: var(--font); font-size: 13px;
  padding: 0.4rem 0.6rem 0.4rem 2rem; outline: none;
}
#search-input:focus { border-color: #111; }
#search-input::placeholder { color: var(--muted); }
.result-count { font-size: 12px; color: var(--muted); white-space: nowrap; }

.table-wrap { overflow-x: auto; position: relative; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }

thead th {
  text-align: left; padding: 0.6rem 1rem;
  font-size: 11px; font-weight: bold; text-transform: uppercase;
  letter-spacing: 0.06em; color: var(--muted);
  border-bottom: 1px solid var(--border);
  cursor: pointer; white-space: nowrap; user-select: none;
  background: var(--surface);
}
thead th:nth-child(1) { position: sticky; left: 0; z-index: 3; box-shadow: 2px 0 4px rgba(0,0,0,0.06); }
thead th:nth-child(2) { position: sticky; left: 44px; z-index: 3; min-width: 140px; box-shadow: 2px 0 4px rgba(0,0,0,0.06); }
thead th:hover { color: var(--text); }
thead th.sort-active { color: var(--text); }
.sort-icon { margin-left: 3px; font-size: 10px; opacity: 0.4; }
thead th.sort-active .sort-icon { opacity: 1; }

tbody tr { border-bottom: 1px solid var(--border); }
tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: var(--surface); }
tbody tr:hover .td-rank, tbody tr:hover .td-player { background: var(--surface); }
tbody td { padding: 0.65rem 1rem; vertical-align: middle; }

.td-rank { width: 44px; font-size: 12px; color: var(--muted); text-align: center; position: sticky; left: 0; z-index: 2; background: var(--surface); box-shadow: 2px 0 4px rgba(0,0,0,0.06); }
.medal { font-size: 14px; }
.td-player { font-weight: bold; position: sticky; left: 44px; z-index: 2; background: var(--surface); min-width: 140px; box-shadow: 2px 0 4px rgba(0,0,0,0.06); }
.td-player-inner { display: flex; align-items: center; gap: 0.5rem; }
.td-player-inner img { width: 20px; height: 20px; border-radius: 2px; image-rendering: pixelated; flex-shrink: 0; }
.player-link { color: inherit; text-decoration: none; }
.player-link:hover { text-decoration: underline; opacity: 0.8; }
.td-num { text-align: right; font-family: monospace; font-size: 13px; }

#no-results { display: none; padding: 2.5rem; text-align: center; color: var(--muted); font-size: 13px; }

::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); }

/* SOCIAL LINKS */
.social-links { display: flex; align-items: center; gap: 0.5rem; }
.social-btn {
  display: flex; align-items: center; justify-content: center;
  width: 32px; height: 32px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--muted);
  text-decoration: none;
  transition: color 0.15s, border-color 0.15s, background 0.15s;
  flex-shrink: 0;
}
.social-btn:hover { border-color: var(--text); color: var(--text); background: var(--bg); }
.social-btn svg { width: 16px; height: 16px; fill: currentColor; }
</style>
</head>
<body>
<div id="app">

  <header>
    <div class="logo">
      <img src="https://mc-heads.net/avatar/DavidBry/30" style="width:30px;height:30px;border-radius:4px;flex-shrink:0;image-rendering:pixelated;" alt="MinionUHC" />
      <div class="logo-text">Minion<span>UHC</span></div>

  </header>

  <!-- ARCHIVE BANNER -->
  <div class="archive-banner">
    <span class="archive-icon">⚠️</span>
    <span>This is the archived stats page for <strong>Season 2</strong>. Stats are final and no longer updating. <a href="./" style="color:var(--text);text-decoration:underline;">View current season →</a></span>
  </div>

  <!-- CARDS -->
  <div class="cards" id="cards"></div>

  <!-- LEADERBOARD -->
  <div class="section">
    <div class="section-header">
      <div style="display:flex;align-items:center;gap:0.75rem;flex-wrap:wrap;">
        <div class="section-title">Leaderboard</div>
        <span style="font-size:11px;color:var(--muted);letter-spacing:0.03em;">Stats last updated: Oct 14, 2024</span>
      </div>
      <div class="table-controls">
        <div class="search-wrap">
          <span class="search-icon">⌕</span>
          <input id="search-input" type="text" placeholder="Search players…" oninput="filterTable()"/>

    <div class="table-wrap">

</div>
<script>
// ── FAKE DATA ─────────────────────────────────────────────────────────────────
const PLAYERS = [
  { Player:'Vastri',      'Games Played':62, 'Survival Wins':18, 'Team Wins':7,  Kills:94,  'PvP Deaths':21, 'PvE Deaths':9  },
  { Player:'mickae',    'Games Played':58, 'Survival Wins':14, 'Team Wins':11, Kills:81,  'PvP Deaths':18, 'PvE Deaths':6  },
  { Player:'Zypherex',    'Games Played':55, 'Survival Wins':12, 'Team Wins':9,  Kills:73,  'PvP Deaths':24, 'PvE Deaths':12 },
  { Player:'CrystalMoth', 'Games Played':49, 'Survival Wins':10, 'Team Wins':6,  Kills:67,  'PvP Deaths':20, 'PvE Deaths':8  },
  { Player:'NightVeil',   'Games Played':47, 'Survival Wins':9,  'Team Wins':5,  Kills:60,  'PvP Deaths':19, 'PvE Deaths':11 },
  { Player:'QuantumBolt', 'Games Played':44, 'Survival Wins':8,  'Team Wins':8,  Kills:55,  'PvP Deaths':16, 'PvE Deaths':7  },
  { Player:'Frostbyte',   'Games Played':42, 'Survival Wins':7,  'Team Wins':4,  Kills:50,  'PvP Deaths':22, 'PvE Deaths':14 },
  { Player:'Dravenix',    'Games Played':40, 'Survival Wins':7,  'Team Wins':3,  Kills:48,  'PvP Deaths':17, 'PvE Deaths':5  },
  { Player:'Luminary',    'Games Played':38, 'Survival Wins':6,  'Team Wins':6,  Kills:44,  'PvP Deaths':15, 'PvE Deaths':9  },
  { Player:'StormCraft',  'Games Played':35, 'Survival Wins':5,  'Team Wins':5,  Kills:41,  'PvP Deaths':14, 'PvE Deaths':10 },
  { Player:'Ashveil',     'Games Played':33, 'Survival Wins':5,  'Team Wins':2,  Kills:38,  'PvP Deaths':20, 'PvE Deaths':7  },
  { Player:'Pyreflare',   'Games Played':30, 'Survival Wins':4,  'Team Wins':4,  Kills:35,  'PvP Deaths':13, 'PvE Deaths':6  },
  { Player:'Onyxblade',   'Games Played':28, 'Survival Wins':4,  'Team Wins':3,  Kills:31,  'PvP Deaths':12, 'PvE Deaths':8  },
  { Player:'Mirepath',    'Games Played':26, 'Survival Wins':3,  'Team Wins':2,  Kills:28,  'PvP Deaths':11, 'PvE Deaths':9  },
  { Player:'Cindra',      'Games Played':24, 'Survival Wins':3,  'Team Wins':1,  Kills:25,  'PvP Deaths':10, 'PvE Deaths':5  },
  { Player:'Ruvex',       'Games Played':22, 'Survival Wins':2,  'Team Wins':3,  Kills:22,  'PvP Deaths':9,  'PvE Deaths':7  },
  { Player:'Thornwick',   'Games Played':20, 'Survival Wins':2,  'Team Wins':2,  Kills:19,  'PvP Deaths':8,  'PvE Deaths':4  },
  { Player:'Galehurst',   'Games Played':18, 'Survival Wins':2,  'Team Wins':1,  Kills:16,  'PvP Deaths':9,  'PvE Deaths':6  },
  { Player:'Emberloch',   'Games Played':15, 'Survival Wins':1,  'Team Wins':1,  Kills:13,  'PvP Deaths':7,  'PvE Deaths':5  },
  { Player:'Solmire',     'Games Played':12, 'Survival Wins':1,  'Team Wins':0,  Kills:9,   'PvP Deaths':6,  'PvE Deaths':3  },
];

const HEADERS = ['Player','Games Played','Survival Wins','Team Wins','Kills','PvP Deaths','PvE Deaths'];
let allRows = PLAYERS.map(r => { const o={}; HEADERS.forEach(h=>o[h]=r[h]); return o; });
let sortCol = 'Survival Wins', sortAsc = false;

// ── CARDS ─────────────────────────────────────────────────────────────────────
function renderCards() {
  const swVals = allRows.map(r => +r['Survival Wins']);
  const swMax = Math.max(...swVals);
  const swTop = allRows[swVals.indexOf(swMax)].Player;

  const kVals = allRows.map(r => +r['Kills']);
  const kMax = Math.max(...kVals);
  const kTop = allRows[kVals.indexOf(kMax)].Player;

  const kdVals = allRows.map(r => {
    const k = +r['Kills'], d = +r['PvP Deaths'] + +r['PvE Deaths'];
    return d > 0 ? k / d : k;
  });
  const kdMax = Math.max(...kdVals);
  const kdTop = allRows[kdVals.indexOf(kdMax)].Player;

  document.getElementById('cards').innerHTML = `
    <div class="card">
      <div class="card-label">Most Survival Wins</div>
      <div class="card-value">${swMax}</div>
      <div class="card-sub"><img src="https://mc-heads.net/avatar/${encodeURIComponent(swTop)}/16" onerror="this.style.display='none'" />${swTop}</div>
    </div>
    <div class="card">
      <div class="card-label">Top Kills</div>
      <div class="card-value">${kMax}</div>
      <div class="card-sub"><img src="https://mc-heads.net/avatar/${encodeURIComponent(kTop)}/16" onerror="this.style.display='none'" />${kTop}</div>
    </div>
    <div class="card">
      <div class="card-label">Best K/D</div>
      <div class="card-value">${kdMax.toFixed(2)}</div>
      <div class="card-sub"><img src="https://mc-heads.net/avatar/${encodeURIComponent(kdTop)}/16" onerror="this.style.display='none'" />${kdTop}</div>
    </div>
    <div class="card">
      <div class="card-label">Total Players</div>
      <div class="card-value">${allRows.length}</div>
    </div>`;
}

// ── TABLE ─────────────────────────────────────────────────────────────────────
function renderThead() {
  const numH = HEADERS.filter(h => h !== 'Player');
  document.getElementById('thead').innerHTML = `<tr>
    <th onclick="setSort('#')" id="th-rank"># <span class="sort-icon">↕</span></th>
    <th onclick="setSort('Player')" id="th-Player">Player <span class="sort-icon">↕</span></th>
    ${numH.map(h=>`<th onclick="setSort('${h}')" id="th-${h.replace(/\W/g,'_')}">${h} <span class="sort-icon">↕</span></th>`).join('')}
  </tr>`;
}

function setSort(col) {
  sortAsc = sortCol === col ? !sortAsc : false;
  sortCol = col;
  applySort();
  updateSortIcons();
}

function applySort() {
  let data = [...allRows];
  if (sortCol && sortCol !== '#') {
    data.sort((a,b) => {
      const av = a[sortCol], bv = b[sortCol];
      const an = parseFloat(av), bn = parseFloat(bv);
      if (!isNaN(an) && !isNaN(bn)) return sortAsc ? an-bn : bn-an;
      return sortAsc ? String(av).localeCompare(String(bv)) : String(bv).localeCompare(String(av));
    });
  }
  renderTbody(data);
}

function updateSortIcons() {
  document.querySelectorAll('thead th').forEach(th => {
    th.classList.remove('sort-active');
    const ic = th.querySelector('.sort-icon');
    if (ic) ic.textContent = '↕';
  });
  const key = sortCol === '#' ? 'rank' : sortCol.replace(/\W/g,'_');
  const th = document.getElementById(`th-${key}`);
  if (th) { th.classList.add('sort-active'); const ic = th.querySelector('.sort-icon'); if(ic) ic.textContent = sortAsc?'↑':'↓'; }
}

function renderTbody(data) {
  const query = document.getElementById('search-input').value.toLowerCase();
  const filtered = query ? data.filter(r => Object.values(r).some(v=>String(v).toLowerCase().includes(query))) : data;
  document.getElementById('result-count').textContent = `${filtered.length} / ${allRows.length}`;
  document.getElementById('no-results').style.display = filtered.length ? 'none' : 'block';
  const MEDALS = ['🥇','🥈','🥉'];
  const numH = HEADERS.filter(h => h !== 'Player');
  document.getElementById('tbody').innerHTML = filtered.map(row => {
    const rank = data.indexOf(row);
    const rankCell = rank < 3 ? `<span class="medal">${MEDALS[rank]}</span>` : `<span style="color:var(--muted)">${rank+1}</span>`;
    const skinUrl = `https://minotar.net/helm/${encodeURIComponent(row.Player)}/20`;
    const nameLink = `<a href="https://namemc.com/profile/${encodeURIComponent(row.Player)}" target="_blank" rel="noopener" class="player-link">${row.Player}</a>`;
    const numCells = numH.map(h=>`<td class="td-num">${Number(row[h]).toLocaleString()}</td>`).join('');
    return `<tr>
      <td class="td-rank">${rankCell}</td>
      <td class="td-player"><div class="td-player-inner"><img src="${skinUrl}" alt="" onerror="this.src='https://mc-heads.net/avatar/${encodeURIComponent(row.Player)}/20';this.onerror=function(){this.style.display='none'}">${nameLink}</div></td>
      ${numCells}
    </tr>`;
  }).join('');
}

function filterTable() { applySort(); }

// ── INIT ──────────────────────────────────────────────────────────────────────
renderCards();
renderThead();
applySort();

// ── THEME ─────────────────────────────────────────────────────────────────────
function toggleTheme() {
  const html = document.documentElement;
  const isDark = html.getAttribute('data-theme') === 'dark';
  const newTheme = isDark ? 'light' : 'dark';
  html.setAttribute('data-theme', newTheme);
  document.getElementById('theme-toggle').textContent = isDark ? '☼ Dark' : '☀ Light';
  localStorage.setItem('minionuhc-theme', newTheme);
}
(function() {
  const saved = localStorage.getItem('minionuhc-theme');
  if (saved) document.documentElement.setAttribute('data-theme', saved);
  const btn = document.getElementById('theme-toggle');
  if (btn) btn.textContent = document.documentElement.getAttribute('data-theme') === 'dark' ? '☀ Light' : '☼ Dark';
})();

// ── SEASONS DROPDOWN ──────────────────────────────────────────────────────────
function toggleSeasons() {
  const btn = document.getElementById('seasons-btn');
  const dd = document.getElementById('seasons-dropdown');
  const open = dd.classList.contains('open');
  dd.classList.toggle('open', !open);
  btn.classList.toggle('open', !open);
}
document.addEventListener('click', function(e) {
  const w = document.getElementById('seasons-wrapper');
  if (w && !w.contains(e.target)) {
    document.getElementById('seasons-dropdown').classList.remove('open');
    document.getElementById('seasons-btn').classList.remove('open');
  }
});
</script>
